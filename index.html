<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Mother's Day</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#ffdde1,#ee9ca7);
      overflow:hidden;
    }

    .container{
      text-align:center;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding:40px;
      border-radius:25px;
      box-shadow:0 8px 30px rgba(0,0,0,0.2);
      width:90%;
      max-width:500px;
      animation: fadeIn 2s ease;
    }

    h1{
      font-size:3rem;
      color:white;
      margin-bottom:15px;
      animation: glow 2s infinite alternate;
    }

    p{
      font-size:1.2rem;
      color:white;
      line-height:1.8;
      margin-bottom:25px;
    }

    .heart{
      font-size:60px;
      color:red;
      animation: heartbeat 1s infinite;
    }

    button{
      padding:12px 25px;
      border:none;
      border-radius:30px;
      background:white;
      color:#ff4b6e;
      font-size:1rem;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.1);
      background:#ff4b6e;
      color:white;
    }

    @keyframes heartbeat{
      0%{transform:scale(1);}
      25%{transform:scale(1.1);}
      50%{transform:scale(1);}
      75%{transform:scale(1.1);}
      100%{transform:scale(1);}
    }

    @keyframes glow{
      from{
        text-shadow:0 0 10px white;
      }
      to{
        text-shadow:0 0 25px #fff, 0 0 40px #ff4b6e;
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .flowers{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
      z-index:-1;
    }

    .flowers span{
      position:absolute;
      display:block;
      font-size:25px;
      animation: float 10s linear infinite;
      opacity:0.8;
    }

    @keyframes float{
      0%{
        transform:translateY(100vh) rotate(0deg);
      }
      100%{
        transform:translateY(-120vh) rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="flowers">
    <span style="left:10%; animation-duration:8s;">🌸</span>
    <span style="left:30%; animation-duration:12s;">🌷</span>
    <span style="left:50%; animation-duration:10s;">💐</span>
    <span style="left:70%; animation-duration:14s;">🌹</span>
    <span style="left:90%; animation-duration:9s;">🌺</span>
  </div>

  <div class="container">
    <div class="heart">❤️</div>

    <h1>Happy Mother's Day</h1>

    <p>
      Dear Mom,<br><br>
      Thank you for your endless love, care, and support.
      You are my strength, my inspiration, and my biggest blessing.
      Wishing you a day filled with happiness and love 💖
    </p>

    <button onclick="showMessage()">
      Click for Surprise
    </button>
  </div>

  <script>
    function showMessage(){
      alert("Love You Amma 💖\nHappy Mother's Day 🌸");
    }
  </script>

</body>
</html>
